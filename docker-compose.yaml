services:
  db:
    image: postgres:16-alpine
    container_name: smartcity-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kasif}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-smartcity}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-kasif} -d ${POSTGRES_DB:-smartcity}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartcity-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3011}:3011"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-kasif}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-smartcity}"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://kasif.erkanerdem.net}
      NEXT_PUBLIC_MAP_CENTER_LAT: ${NEXT_PUBLIC_MAP_CENTER_LAT:-39.6484}
      NEXT_PUBLIC_MAP_CENTER_LNG: ${NEXT_PUBLIC_MAP_CENTER_LNG:-27.8826}
      NEXT_PUBLIC_MAP_ZOOM: ${NEXT_PUBLIC_MAP_ZOOM:-10}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
