services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: smartcity
      POSTGRES_USER: kasif
      POSTGRES_PASSWORD: kasif2026secure
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kasif -d smartcity"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://kasif:kasif2026secure@db:5432/smartcity
      JWT_SECRET: kasif-super-secret-key-change-this
      NEXT_PUBLIC_APP_URL: https://kasif.erkanerdem.net
      NEXT_PUBLIC_MAP_CENTER_LAT: "39.6484"
      NEXT_PUBLIC_MAP_CENTER_LNG: "27.8826"
      NEXT_PUBLIC_MAP_ZOOM: "10"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
